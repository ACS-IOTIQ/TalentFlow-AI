services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: acs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talentflow}
      POSTGRES_USER: ${POSTGRES_USER:-talentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-talentflow_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acs_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: acs_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── MinIO Setup (create buckets) ─────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: acs_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing minio/talentflow-resumes;
      mc mb --ignore-existing minio/talentflow-jds;
      mc mb --ignore-existing minio/talentflow-profiles;
      mc mb --ignore-existing minio/talentflow-avatars;
      mc anonymous set download minio/talentflow-avatars;
      echo 'MinIO buckets ready';
      "

  # ─── Ollama (local AI inference) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: acs_ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Uncomment on a host with an NVIDIA GPU + nvidia-container-toolkit installed — no other change needed:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Ollama Setup (pre-pull the model, one-shot) ─────────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: acs_ollama_setup
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      ollama pull ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct};
      echo 'Ollama model ready';
      "

  # ─── Next.js Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: acs_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-talentflow}:${POSTGRES_PASSWORD:-talentflow_secure_pass}@postgres:5432/${POSTGRES_DB:-talentflow}
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      # Auth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production-use-openssl-rand-base64-32}
      AUTH_TRUST_HOST: "true"
      # MinIO / S3
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9100}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RESUMES: talentflow-resumes
      MINIO_BUCKET_JDS: talentflow-jds
      MINIO_BUCKET_PROFILES: talentflow-profiles
      MINIO_BUCKET_AVATARS: talentflow-avatars
      # AI — local Ollama by default (no API key, no cost, no rate limits)
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_MODEL: ${AI_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-600000}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      # Optional — only used if AI_PROVIDER is switched away from "ollama"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GEMINI_API_BASE: ${GEMINI_API_BASE:-}
      # Email
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      FROM_NAME: ${FROM_NAME:-Talent Flow AI}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@acstechnologies.com}
      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  app_logs:
